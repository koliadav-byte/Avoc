<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Опросник · Цифровая платформа для адвокатского бюро · РБ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0A0A0A;
    --bg2:       #050505;
    --surface:   #111111;
    --surface2:  #1A1A1A;
    --border:    rgba(31,41,55,0.6);
    --border2:   rgba(31,41,55,1);
    --text:      #F5F5F5;
    --text-muted:#A0A0A0;
    --text-hint: #606060;
    --gold:      #C9A962;
    --gold-dim:  rgba(201,169,98,0.10);
    --gold-mid:  rgba(201,169,98,0.16);
    --gold-glow: 0 0 24px rgba(201,169,98,0.15);
    --radius:    8px;
    --font:      'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── Header ──────────────────────────────── */
  .header {
    background: var(--surface);
    border: 1px solid var(--gold-mid);
    border-radius: var(--radius);
    padding: 2rem 2.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,169,98,0.4), transparent);
  }
  .header-tag {
    font-size: 10px;
    font-weight: 400;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 14px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
    line-height: 1.25;
  }
  .header p {
    font-size: 13px;
    color: var(--text-hint);
    letter-spacing: 0.02em;
  }

  /* ── Progress ────────────────────────────── */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-bar {
    height: 1px;
    background: var(--border2);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 1px;
    transition: width 0.4s ease;
    width: 0%;
    box-shadow: 0 0 6px rgba(201,169,98,0.5);
  }
  .progress-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-hint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Section ─────────────────────────────── */
  .section {
    background: rgba(17,17,17,0.88);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section:has(.section-body.open) { border-color: var(--gold-mid); }
  .section-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--surface2); }
  .section-header.open { border-bottom-color: var(--border2); }
  .section-num {
    width: 26px; height: 26px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    background: var(--gold-dim);
    color: var(--gold);
    border: 1px solid var(--gold-mid);
    flex-shrink: 0;
    font-family: var(--font);
    letter-spacing: 0;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }
  .section-arrow {
    font-size: 8px;
    color: var(--text-hint);
    transition: transform 0.2s ease;
  }
  .section-arrow.open { transform: rotate(90deg); color: var(--gold); }
  .section-body { display: none; padding: 20px; }
  .section-body.open { display: block; }

  /* ── Question ────────────────────────────── */
  .q { margin-bottom: 1.25rem; }
  .q:last-child { margin-bottom: 0; }
  .q-num {
    font-size: 10px;
    font-weight: 400;
    color: var(--gold);
    margin-bottom: 4px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .q-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .q-hint {
    font-size: 11px;
    color: var(--text-hint);
    margin-bottom: 8px;
  }
  .law-badge {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 400;
    background: var(--gold-dim);
    color: var(--gold);
    border: 1px solid var(--gold-mid);
    border-radius: 4px;
    padding: 3px 8px;
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }
  .divider {
    height: 1px;
    background: var(--border2);
    margin: 1.25rem 0;
  }

  /* ── Opts (pill buttons) ─────────────────── */
  .opts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .opt {
    padding: 5px 13px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    background: var(--bg2);
    transition: all 0.15s ease;
    line-height: 1.4;
  }
  .opt:hover {
    background: var(--surface2);
    border-color: var(--gold);
    color: var(--text);
  }

  /* Selected states — all unified to gold on dark theme */
  .sel-teal,
  .sel-blue,
  .sel-amber,
  .sel-coral,
  .sel-purple {
    background: var(--gold-dim) !important;
    border-color: var(--gold) !important;
    color: var(--gold) !important;
    box-shadow: 0 0 0 1px rgba(212,165,116,0.15) !important;
  }

  /* ── Text inputs ─────────────────────────── */
  .ta, .ti {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    background: var(--bg2);
    line-height: 1.5;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .ta { resize: vertical; min-height: 60px; }
  .ta::placeholder, .ti::placeholder { color: var(--text-hint); }
  .ta:focus, .ti:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,165,116,0.12);
  }
  .other-input {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-hint);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .other-input input {
    flex: 1;
    padding: 5px 10px;
    border: 1px dashed var(--border2);
    border-radius: 6px;
    font-family: var(--font);
    font-size: 12px;
    background: var(--bg2);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .other-input input::placeholder { color: var(--text-hint); }
  .other-input input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,165,116,0.12);
  }

  /* ── Matrix / table ──────────────────────── */
  .matrix-wrap { overflow-x: auto; margin-top: 8px; border-radius: 6px; border: 1px solid var(--border); }
  table.matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .matrix th {
    font-weight: 600;
    font-size: 10px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    text-align: left;
    white-space: nowrap;
  }
  .matrix td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
    vertical-align: middle;
    font-size: 12.5px;
  }
  .matrix td:not(:first-child) { text-align: center; }
  .matrix tr:last-child td { border-bottom: none; }
  .matrix tr:hover td { background: var(--surface2); }
  input[type=checkbox], input[type=radio] {
    width: 15px; height: 15px;
    cursor: pointer;
    accent-color: var(--gold);
  }

  /* ── Scenario grid ───────────────────────── */
  .sg-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .sg-head {
    display: grid;
    grid-template-columns: 1fr 90px 110px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .sg-head span {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .sg-head span:not(:first-child) { text-align: center; }
  .sg-row {
    display: grid;
    grid-template-columns: 1fr 90px 110px;
    border-bottom: 1px solid var(--border);
  }
  .sg-row:last-child { border-bottom: none; }
  .sg-row:hover { background: var(--surface2); }
  .sg-cell {
    padding: 9px 12px;
    font-size: 12.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
  }
  .sg-cell:not(:first-child) { justify-content: center; }

  /* ── Footer ──────────────────────────────── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    padding: 1.5rem 0 0;
    border-top: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .footer-note {
    font-size: 12px;
    color: var(--text-hint);
    font-weight: 500;
  }
  .btn {
    padding: 8px 18px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.15s ease;
  }
  .btn:hover {
    background: var(--surface2);
    color: var(--text);
  }
  .btn-gold {
    background: var(--gold-dim);
    color: var(--gold);
    border-color: var(--gold-mid);
  }
  .btn-gold:hover {
    background: rgba(201,169,98,0.18);
    color: var(--gold);
  }
  .btn-primary {
    background: var(--gold);
    color: #0A0A0A;
    border-color: var(--gold);
    font-weight: 700;
  }
  .btn-primary:hover {
    background: #d4b870;
    border-color: #d4b870;
  }

  /* ── Print ───────────────────────────────── */
  @media print {
    body { background: #fff; color: #111; padding: 0; }
    .shell { max-width: 100%; }
    .section-body { display: block !important; }
    .footer { display: none; }
    .header { background: #1A2332 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
    .section, .meta-card { border-color: #ccc !important; }
    .opt { border-color: #aaa !important; color: #333 !important; }
  }

  /* ── Scrollbar ───────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-hint); }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="header-tag">Конфиденциально · Для внутреннего использования</div>
    <h1>Цифровая платформа для адвокатского бюро</h1>
    <p>Опросник · Республика Беларусь · 11 блоков · ~40 минут</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <span class="progress-label" id="prog-label">Заполнено: 0 ответов</span>
  </div>

  <div id="sections-container"></div>

  <div class="footer">
    <span class="footer-note" id="footer-count">0 ответов заполнено</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="expandAll()">Раскрыть все</button>
      <button class="btn btn-gold" onclick="exportTxt()">Скопировать итог</button>
      <button class="btn btn-primary" onclick="window.print()">Печать / PDF</button>
    </div>
  </div>

</div>

<script>
const SECTIONS = [
  {
    id:'goals', num:1, title:'Цели и приоритеты',
    qs:[
      {id:'goals_p1', label:'1.1. Приоритетные задачи 1 этапа', hint:'Выберите все нужные', multi:true, color:'teal',

       hint:'Выберите все нужные', multi:true, color:'blue',
       opts:['НЦИС РБ (ncip.by)','Евразийское патентное ведомство (ЕАПО)','Espacenet (EPO)','WIPO PATENTSCOPE','TMview (товарные знаки ЕС)','USPTO','Google Patents','Другое:'], hasOther:true},
      {id:'news_src', label:'3.3. Источники новостей для мониторинга', multi:true, color:'blue',
       opts:['pravo.by — официальные документы','Национальный правовой портал','Официальные сайты госорганов (МЮ, Минфин)','Отраслевые белорусские юридические издания','Telegram-каналы','Международные источники (WIPO, EPO)','Другое:'], hasOther:true},

const DATA_ROWS = [
  ['pd','Персональные данные клиентов'],
  ['passport','Паспортные / идентификационные данные'],
  ['cases','Данные о делах и клиентах'],
  ['correspondence','Переписка с клиентами'],
  ['opinions','Правовые заключения'],
  ['financial','Финансовые и платёжные данные'],
  ['patents_mat','Патентные материалы / заявки'],
  ['trademarks','Товарные знаки / бренды / досье'],
  ['hr','Кадровые данные сотрудников'],
  ['accounting','Бухгалтерские документы']
];

const SCENARIO_ROWS = [
  ['sc_chat_ai','Чат для ИИ анализа и подготовки документов'],
  ['sc_chat_docs','Чат по внутренним документам'],
  ['sc_news_search','Поиск по новостям'],
  ['sc_news_digest','Дайджест новостей'],
  ['sc_trends','Анализ тенденций и рисков'],
  ['sc_patent','Поиск по патентам'],
  ['sc_tm','Поиск по товарным знакам'],
  ['sc_novelty','Проверка новизны / аналогов'],

const TRANSFER_ROWS = [
  ['open','Новости и открытые источники'],
  ['npa','Нормативно-правовые акты'],
  ['court','Судебная практика (открытые источники)'],
  ['patents_open','Патенты и ТЗ из открытых реестров'],
  ['templates','Внутренние шаблоны без данных клиентов'],
  ['contracts','Договоры клиентов'],
  ['client_corr','Переписка с клиентами'],
  ['opinions_conf','Правовые заключения по делам'],
  ['personal','Документы с персональными данными'],
  ['patent_app','Патентные заявки клиентов до подачи'],
  ['accounting_docs','Бухгалтерские документы']
];

const answers = {};

function updateProgress() {
  const total = countAnswered();
  document.getElementById('prog').style.width = Math.min(100, total * 2.2) + '%';
  document.getElementById('prog-label').textContent = 'Заполнено: ' + total + ' ответов';
  document.getElementById('footer-count').textContent = total + ' ответов заполнено';
}

function countAnswered() {
  return Object.keys(answers).filter(k => {
    const v = answers[k];
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === 'boolean') return v;
    return v && String(v).trim() !== '';
  }).length;
}

function buildSections() {
  const cont = document.getElementById('sections-container');
  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'sec-' + sec.id;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<div class="section-num">${sec.num}</div><div class="section-title">${sec.title}</div><span class="section-arrow" id="arr-${sec.id}">▶</span>`;
    hdr.addEventListener('click', () => toggleSection(sec.id));

    const body = document.createElement('div');
    body.className = 'section-body';
    body.id = 'body-' + sec.id;

    if (sec.type === 'matrix_data') {
      body.innerHTML = buildMatrixData();
    } else if (sec.type === 'scenarios') {
      body.innerHTML = buildScenarios();
    } else if (sec.type === 'matrix_transfer') {
      body.innerHTML = buildMatrixTransfer();
    } else {
      body.innerHTML = buildQuestions(sec.qs);
    }

    div.appendChild(hdr);
    div.appendChild(body);
    cont.appendChild(div);
  });
  bindEvents();
}

function buildQuestions(qs) {
  return qs.map((q, qi) => {
    let html = `<div class="q">`;
    html += `<div class="q-num">${q.id.replace(/_/g,' ')}</div>`;
    if (q.law) html += `<div class="law-badge">${q.law}</div><br>`;
    html += `<div class="q-label">${q.label}</div>`;
    if (q.hint) html += `<div class="q-hint">${q.hint}</div>`;

    if (q.type === 'textarea') {
      html += `<textarea class="ta" data-k="${q.id}" placeholder="${q.placeholder||''}"></textarea>`;
    } else {
      html += `<div class="opts" data-k="${q.id}" data-multi="${q.multi?1:0}" data-color="${q.color}">`;
      q.opts.forEach(opt => {
        html += `<div class="opt">${opt}</div>`;
      });
      html += `</div>`;
      if (q.hasOther) {
        html += `<div class="other-input"><span>Другое:</span><input type="text" data-k="${q.id}_other" placeholder="укажите вариант..."></div>`;
      }
      if (q.hasOtherAlways) {
        html += `<div style="margin-top:6px"><input class="ti" data-k="${q.id}_detail" placeholder="${q.hasOtherLabel||'Дополните...'}" style="font-size:12px"></div>`;
      }
    }
    html += `</div>`;
    if (qi < qs.length - 1) html += `<div class="divider"></div>`;
    return html;
  }).join('');
}

function buildMatrixData() {
  let h = `<div class="q-label" style="margin-bottom:8px">5.1. Категории данных в работе бюро</div>`;
  h += `<div class="law-badge">Закон РБ «О персональных данных» № 99-З от 07.05.2021</div>`;
  h += `<div class="matrix-wrap"><table class="matrix"><tr><th style="min-width:170px">Категория</th><th>Есть</th><th>Часто используется</th><th>Высокая конфиденциальность</th></tr>`;
  DATA_ROWS.forEach(([k, l]) => {
    h += `<tr><td>${l}</td><td><input type="checkbox" data-k="dm_${k}_has"></td><td><input type="checkbox" data-k="dm_${k}_freq"></td><td><input type="checkbox" data-k="dm_${k}_conf"></td></tr>`;
  });
  h += `</table></div>`;
  return h;
}

function buildScenarios() {
  let h = `<div class="q-label" style="margin-bottom:10px">6.1. Какие сценарии нужны на 1 этапе?</div>`;
  h += `<div class="sg-wrap"><div class="sg-head"><span>Сценарий</span><span>Нужен</span><span>Высокий приоритет</span></div>`;
  SCENARIO_ROWS.forEach(([k, l]) => {
    h += `<div class="sg-row"><div class="sg-cell">${l}</div><div class="sg-cell"><input type="checkbox" data-k="${k}_need"></div><div class="sg-cell"><input type="checkbox" data-k="${k}_prio"></div></div>`;
  });
  h += `</div>`;
  h += `<div class="divider"></div><div class="q"><div class="q-label">6.2. Три сценария с наивысшим приоритетом</div><textarea class="ta" data-k="top3_scenarios" placeholder="1. …&#10;2. …&#10;3. …"></textarea></div>`;
  return h;
}

function buildMatrixTransfer() {
  let h = `<div class="q-label" style="margin-bottom:6px">7.1. Что разрешено передавать в ИИ-сервисы?</div>`;
  h += `<div class="law-badge">Закон № 99-З · Закон «Об адвокатуре» № 113-З · Трансграничная передача — ст. 8 закона № 99-З</div>`;
  h += `<div class="matrix-wrap"><table class="matrix"><tr><th style="min-width:190px">Категория данных</th><th>Можно</th><th>Нельзя</th><th>Только после обезличивания</th></tr>`;
  TRANSFER_ROWS.forEach(([k, l]) => {
    h += `<tr><td>${l}</td><td><input type="radio" name="mx_${k}" data-k="mx_${k}" value="yes"></td><td><input type="radio" name="mx_${k}" data-k="mx_${k}" value="no"></td><td><input type="radio" name="mx_${k}" data-k="mx_${k}" value="anon"></td></tr>`;
  });
  h += `</table></div>`;
  return h;
}

function toggleSection(id) {
  const body = document.getElementById('body-' + id);
  const arr = document.getElementById('arr-' + id);
  const hdr = body.previousElementSibling;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arr.classList.toggle('open', !isOpen);
  hdr.classList.toggle('open', !isOpen);
}

function expandAll() {
  SECTIONS.forEach(s => {
    document.getElementById('body-' + s.id).classList.add('open');
    document.getElementById('arr-' + s.id).classList.add('open');
    document.getElementById('sec-' + s.id).querySelector('.section-header').classList.add('open');
  });
}

function bindEvents() {
  document.querySelectorAll('.opts').forEach(wrap => {
    const k = wrap.dataset.k;
    const multi = wrap.dataset.multi === '1';
    const cls = 'sel-' + wrap.dataset.color;
    wrap.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!answers[k]) answers[k] = [];
        const t = btn.textContent.replace(/:$/, '').trim();
        if (multi) {
          const idx = answers[k].indexOf(t);
          if (idx > -1) { answers[k].splice(idx, 1); btn.classList.remove(cls); }
          else { answers[k].push(t); btn.classList.add(cls); }
        } else {
          answers[k] = [t];
          wrap.querySelectorAll('.opt').forEach(b => b.classList.remove(cls));
          btn.classList.add(cls);
        }
        updateProgress();
      });
    });
  });

  document.querySelectorAll('textarea[data-k]').forEach(el => {
    el.addEventListener('input', () => { answers[el.dataset.k] = el.value; updateProgress(); });
  });

  document.querySelectorAll('input[type=text][data-k], input[type=date][data-k]').forEach(el => {
    el.addEventListener('input', () => { answers[el.dataset.k] = el.value; updateProgress(); });
  });

  document.querySelectorAll('input[type=checkbox][data-k]').forEach(el => {
    el.addEventListener('change', () => { answers[el.dataset.k] = el.checked; updateProgress(); });
  });

  document.querySelectorAll('input[type=radio][data-k]').forEach(el => {
    el.addEventListener('change', () => { answers[el.dataset.k] = el.value; updateProgress(); });
  });
}

function exportTxt() {
  let txt = 'ОПРОСНИК: ЦИФРОВАЯ ПЛАТФОРМА ДЛЯ АДВОКАТСКОГО БЮРО\n';
  txt += 'Республика Беларусь\n';
  txt += '='.repeat(52) + '\n\n';

  SECTIONS.forEach(sec => {
    txt += `\n## ${sec.num}. ${sec.title}\n`;
    Object.keys(answers).filter(k => {
      const v = answers[k];
      if (Array.isArray(v)) return v.length > 0;
      if (typeof v === 'boolean') return v;
      return v && String(v).trim();
    }).forEach(k => {
      const v = answers[k];
      const val = Array.isArray(v) ? v.join(', ') : (v === true ? '✓' : v === false ? '' : v);
      if (val) txt += `  ${k}: ${val}\n`;
    });
  });

  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.btn-gold');
    const orig = btn.textContent;
    btn.textContent = 'Скопировано ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

buildSections();
